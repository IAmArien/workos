version: "3.9"

services:
  db:
    image: mysql:8
    container_name: workos-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: p@ssw0rd
      MYSQL_DATABASE: workosdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  app:
    build: .
    container_name: workos-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/workosdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: p@ssw0rd
      APP_SECURITY_API_KEY: bMSvzHMwEFa4WZRs7A8yMm3sExgmurNj
      JWT_SECRET: JTrBUirpYcvGvfFN9inLBvR2I3wzCTQY
      JWT_ACCESS_TOKEN_EXPIRATION: 900000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000

volumes:
  mysql_data: